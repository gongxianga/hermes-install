name: Build EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "HermesAgent" hermes_app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesAgent-windows
          path: dist/HermesAgent.exe

      - name: Create Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Hermes Agent v1.0.${{ github.run_number }}"
          files: dist/HermesAgent.exe
          body: |
            🚀 自动构建版本

            ## 下载和使用
            1. 下载 `HermesAgent.exe`
            2. 双击运行即可

            **前提条件:** 需要先安装 Hermes Agent 并运行 `hermes setup`

            ---
            构建时间: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
